<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MONO : POLY</title>
  <meta name="description"
    content="An interactive 3D visualizer exploring the transition from singular density to distributed networks. A Bauhaus-inspired Three.js experience." />
  <style>
    /* ── Reset & Full-Bleed Canvas ───────────────────────────────── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #FFFFFF;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #cta {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
      font-size: clamp(32px, 5vw, 64px);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111;
      opacity: 0;
      animation: cta-pulse 5s ease 2s forwards;
    }

    @keyframes cta-pulse {
      0% {
        opacity: 0;
      }

      16% {
        opacity: 1;
      }

      /* fade in over ~0.8s */
      70% {
        opacity: 1;
      }

      /* hold visible */
      100% {
        opacity: 0;
      }

      /* fade out */
    }

    #cta.hidden {
      animation: none;
      opacity: 0;
    }
  </style>
</head>

<body>

  <div id="cta">Click the Cube</div>

  <!-- Three.js r162 via CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    /* ================================================================
       CONSTANTS & CONFIG
       ================================================================ */

    // Palette matched to reference image
    const PALETTE = [
      0xFF6D00,  // Orange
      0x00D4FF,  // Cyan
      0xFFD600,  // Yellow
      0x00A651,  // Green
      0x7B2FBE,  // Purple
      0x0066FF,  // Blue
      0xFF00B8,  // Magenta
      0xFFB0C8,  // Pink
      0xFFFFFF   // White
    ];

    const GRID_SIZE = 3;          // 3×3×3 grid
    const CUBE_SIZE = 1.0;        // size of each sub-cube
    const GAP = 0.025;      // microscopic gap between cubes
    const STRIDE = CUBE_SIZE + GAP;

    // Physics
    const EXPLOSION_FORCE = 0.18;    // impulse magnitude (tuned to keep cloud in-frame)
    const DRAG = 0.955;   // velocity multiplier per frame (higher = more drag)
    const SPIN_SPEED = 0.012;   // max spin rate per axis per frame
    const MIN_VELOCITY = 0.0003;  // threshold to stop movement

    /* ================================================================
       RENDERER SETUP — optimised for high-res screenshots
       ================================================================ */

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      preserveDrawingBuffer: true
    });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    /* ================================================================
       SCENE & FOG
       ================================================================ */

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xF8F8F8);
    scene.fog = new THREE.Fog(0xF8F8F8, 35, 90);

    /* ── Environment map — gives cubes realistic studio reflections ── */
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();
    const envTexture = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
    scene.environment = envTexture;
    pmremGenerator.dispose();

    /* ================================================================
       CAMERA
       ================================================================ */

    const camera = new THREE.PerspectiveCamera(
      40,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(9, 7, 14);
    camera.lookAt(0, 0, 0);

    // OrbitControls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 5;
    controls.maxDistance = 60;
    controls.enablePan = true;
    controls.autoRotate = false;

    /* ================================================================
       LIGHTING — Premium Studio Setup
       ================================================================ */

    // Soft ambient fill
    const ambient = new THREE.AmbientLight(0xFFFFFF, 0.35);
    scene.add(ambient);

    // Key light — warm, from upper-right
    const keyLight = new THREE.DirectionalLight(0xFFF4E6, 2.2);
    keyLight.position.set(8, 14, 6);
    scene.add(keyLight);

    // Fill light — cool, from left
    const fillLight = new THREE.DirectionalLight(0xE6F0FF, 0.8);
    fillLight.position.set(-8, 6, 4);
    scene.add(fillLight);

    // Rim / back light — edge definition
    const rimLight = new THREE.DirectionalLight(0xFFFFFF, 0.6);
    rimLight.position.set(-4, 2, -10);
    scene.add(rimLight);

    // Bottom bounce light — lifts shadows
    const bounceLight = new THREE.DirectionalLight(0xF0F0FF, 0.3);
    bounceLight.position.set(0, -8, 0);
    scene.add(bounceLight);

    /* ================================================================
       STATE 1: "MONO" — A Single Solid Cube
       ================================================================ */

    // Parent group for unified rotation in MONO state
    const monoGroup = new THREE.Group();
    scene.add(monoGroup);

    // The monolith: one solid cube, sized to match the full 3×3×3 grid
    const monoSize = GRID_SIZE * STRIDE;
    const monoGeo = new THREE.BoxGeometry(monoSize, monoSize, monoSize);
    // Pick a random colorful Bauhaus color for the monolith
    const monoColor = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    const monoMat = new THREE.MeshPhysicalMaterial({
      color: monoColor,
      roughness: 0.18,
      metalness: 0.05,
      clearcoat: 0.8,
      clearcoatRoughness: 0.15,
      reflectivity: 0.6,
      transparent: true,
      opacity: 1,
      envMapIntensity: 1.2
    });
    const monolith = new THREE.Mesh(monoGeo, monoMat);
    monoGroup.add(monolith);

    // Array to hold each sub-cube's data (hidden until explosion)
    const blocks = [];

    // Geometry shared across all sub-cubes
    const blockGeo = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);

    // Pre-build the 27 sub-cubes (invisible for now)
    const halfGrid = (GRID_SIZE - 1) / 2;

    for (let ix = 0; ix < GRID_SIZE; ix++) {
      for (let iy = 0; iy < GRID_SIZE; iy++) {
        for (let iz = 0; iz < GRID_SIZE; iz++) {

          // Each sub-cube gets a random Bauhaus color (revealed on explosion)
          const color = PALETTE[Math.floor(Math.random() * PALETTE.length)];

          const material = new THREE.MeshPhysicalMaterial({
            color: color,
            roughness: 0.2,
            metalness: 0.05,
            clearcoat: 0.7,
            clearcoatRoughness: 0.2,
            reflectivity: 0.5,
            transparent: true,
            opacity: 1,
            envMapIntensity: 1.0
          });

          const mesh = new THREE.Mesh(blockGeo, material);

          // Position within the grid, centered at origin
          const localX = (ix - halfGrid) * STRIDE;
          const localY = (iy - halfGrid) * STRIDE;
          const localZ = (iz - halfGrid) * STRIDE;
          mesh.position.set(localX, localY, localZ);
          mesh.visible = false;  // hidden in MONO state

          monoGroup.add(mesh);

          blocks.push({
            mesh: mesh,
            localOrigin: new THREE.Vector3(localX, localY, localZ),
            velocity: new THREE.Vector3(),
            angularVelocity: new THREE.Vector3(),
            // Gentle perpetual spin (assigned on explosion)
            driftSpin: new THREE.Vector3(),
            active: false
          });
        }
      }
    }

    /* ================================================================
       RAYCASTER — Click Detection
       ================================================================ */

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let isExploded = false;
    let isAnimating = false;  // lock during transitions

    /**
     * On click: toggle between MONO and POLY states.
     */
    function onPointerDown(event) {
      if (isAnimating) return;

      // Normalise pointer coords to [-1, 1]
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);

      if (!isExploded) {
        // MONO → POLY: click on the monolith
        const hits = raycaster.intersectObject(monolith, false);
        if (hits.length > 0) triggerPoly();
      } else {
        // POLY → MONO: click on any floating block
        const meshes = blocks.map(b => b.mesh);
        const hits = raycaster.intersectObjects(meshes, false);
        if (hits.length > 0) triggerMono();
      }
    }

    window.addEventListener('pointerdown', onPointerDown);

    /* ================================================================
       STATE 2: "POLY" — The Anti-Gravity Explosion
       ================================================================ */

    function triggerPoly() {
      isExploded = true;
      isAnimating = true;

      // Fade out call-to-action
      document.getElementById('cta').classList.add('hidden');

      // Hide the monolith
      monolith.visible = false;
      monoMat.opacity = 1;  // reset for next cycle

      // Reset sub-cube opacities
      blocks.forEach(block => {
        block.mesh.material.opacity = 1;
      });

      // Reveal sub-cubes at their world positions and explode them
      blocks.forEach(block => {
        const worldPos = new THREE.Vector3();
        block.mesh.getWorldPosition(worldPos);

        const worldQuat = new THREE.Quaternion();
        block.mesh.getWorldQuaternion(worldQuat);

        // Re-parent to scene and make visible
        monoGroup.remove(block.mesh);
        scene.add(block.mesh);

        block.mesh.position.copy(worldPos);
        block.mesh.quaternion.copy(worldQuat);
        block.mesh.visible = true;

        // Calculate explosion direction: from cube center outward
        const dir = worldPos.clone().normalize();
        dir.x += (Math.random() - 0.5) * 0.3;
        dir.y += (Math.random() - 0.5) * 0.3;
        dir.z += (Math.random() - 0.5) * 0.3;
        dir.normalize();

        const force = EXPLOSION_FORCE * (0.8 + Math.random() * 0.6);
        block.velocity.copy(dir).multiplyScalar(force);

        // Random independent spin (decays with drag)
        block.angularVelocity.set(
          (Math.random() - 0.5) * SPIN_SPEED * 2,
          (Math.random() - 0.5) * SPIN_SPEED * 2,
          (Math.random() - 0.5) * SPIN_SPEED * 2
        );

        // Gentle perpetual spin that never stops
        block.driftSpin.set(
          (Math.random() - 0.5) * 0.003,
          (Math.random() - 0.5) * 0.003,
          (Math.random() - 0.5) * 0.003
        );

        block.active = true;
      });

      // Unlock after explosion settles
      setTimeout(() => { isAnimating = false; }, 600);
    }

    /* ================================================================
       REASSEMBLE: "MONO" — Smooth collapse back to cube
       ================================================================ */

    // Return-animation state (driven by main loop, no competing RAF)
    let isReturning = false;
    let returnStart = 0;
    const RETURN_DURATION = 1200;  // ms — longer = smoother
    let returnStartStates = [];
    let returnFrozenTargets = [];  // pre-computed world positions
    let returnFrozenQuat = null;   // pre-computed target quaternion

    function triggerMono() {
      isAnimating = true;
      isReturning = true;

      // Stop all physics
      blocks.forEach(block => {
        block.velocity.set(0, 0, 0);
        block.active = false;
      });

      returnStart = performance.now();

      // Snapshot each block's current world state
      returnStartStates = blocks.map(block => ({
        pos: block.mesh.position.clone(),
        quat: block.mesh.quaternion.clone()
      }));

      // Freeze the monoGroup's current transform so targets don't shift
      monoGroup.updateMatrixWorld(true);
      returnFrozenQuat = new THREE.Quaternion().setFromEuler(monoGroup.rotation);
      returnFrozenTargets = blocks.map(block =>
        block.localOrigin.clone().applyMatrix4(monoGroup.matrixWorld)
      );

      // Show monolith immediately but fully transparent for cross-fade
      monolith.visible = true;
      monoMat.opacity = 0;
    }

    // Quintic ease-in-out — extremely smooth, no micro-stutter
    function easeInOutQuint(t) {
      return t < 0.5
        ? 16 * t * t * t * t * t
        : 1 - Math.pow(-2 * t + 2, 5) / 2;
    }

    /* ================================================================
       ANIMATION LOOP (single RAF — no competing loops)
       ================================================================ */

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = clock.elapsedTime;

      /* ── Return animation (runs inside main loop) ──────────── */
      if (isReturning) {
        const t = Math.min((performance.now() - returnStart) / RETURN_DURATION, 1);
        const ease = easeInOutQuint(t);

        blocks.forEach((block, i) => {
          block.mesh.position.lerpVectors(returnStartStates[i].pos, returnFrozenTargets[i], ease);
          block.mesh.quaternion.slerpQuaternions(returnStartStates[i].quat, returnFrozenQuat, ease);
        });

        // Cross-fade: blocks fade out, monolith fades in (last 40% of animation)
        const fadeStart = 0.55;
        if (t > fadeStart) {
          const fadeT = (t - fadeStart) / (1 - fadeStart);  // 0→1 over the fade range
          const smoothFade = fadeT * fadeT * (3 - 2 * fadeT); // smoothstep
          monoMat.opacity = smoothFade;
          blocks.forEach(block => {
            block.mesh.material.opacity = 1 - smoothFade;
          });
        }

        if (t >= 1) {
          // Finalize: reset opacities and re-parent
          monoMat.opacity = 1;
          blocks.forEach(block => {
            block.mesh.material.opacity = 1;
            scene.remove(block.mesh);
            monoGroup.add(block.mesh);
            block.mesh.position.copy(block.localOrigin);
            block.mesh.quaternion.identity();
            block.mesh.visible = false;
          });

          monolith.visible = true;
          isExploded = false;
          isAnimating = false;
          isReturning = false;
        }
      } else if (!isExploded) {
        /* ── MONO: Slow, elegant unified rotation ──────────────── */
        monoGroup.rotation.x = elapsed * 0.12;
        monoGroup.rotation.y = elapsed * 0.18;
      } else {
        /* ── POLY: Independent physics + gentle ambient drift ──── */
        blocks.forEach((block, i) => {
          if (!block.active) return;

          // Apply explosion velocity (decays to zero)
          block.mesh.position.add(block.velocity);
          block.velocity.multiplyScalar(DRAG);

          if (block.velocity.length() < MIN_VELOCITY) {
            block.velocity.set(0, 0, 0);
          }

          // Gentle perpetual floating drift (sinusoidal bob)
          const phase = i * 1.7;
          block.mesh.position.x += Math.sin(elapsed * 0.3 + phase) * 0.0012;
          block.mesh.position.y += Math.cos(elapsed * 0.25 + phase * 0.7) * 0.0015;
          block.mesh.position.z += Math.sin(elapsed * 0.2 + phase * 1.3) * 0.001;

          // Slow perpetual spin (never fully stops)
          block.mesh.rotation.x += block.driftSpin.x;
          block.mesh.rotation.y += block.driftSpin.y;
          block.mesh.rotation.z += block.driftSpin.z;
        });
      }

      // Update OrbitControls
      controls.update();

      renderer.render(scene, camera);
    }

    animate();

    /* ================================================================
       RESPONSIVE RESIZE
       ================================================================ */

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener('resize', onResize);

  </script>
</body>

</html>
